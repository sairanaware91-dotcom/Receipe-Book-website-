<h2>Ingredients</h2>

<ul>
<li>Rice</li>
<li>Cooking oil</li>
<li>Onion</li>
<li>Tomato</li>
<li>Spices</li>
<li>Vegetables or chicken</li>
</ul>

<h2>Steps</h2>

<ol>
<li>Cook rice separately.</li>
<li>Heat oil in a pan.</li>
<li>Sauté onion and tomato.</li>
