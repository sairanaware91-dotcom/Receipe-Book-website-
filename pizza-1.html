<!DOCTYPE html>
<html>
<head>
<title>Pizza Recipe</title>

<style>

body{
font-family:Arial;
background:#fff7f0;
text-align:center;
padding:30px;
}

.container{
background:white;
max-width:700px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

img{
width:100%;
max-width:400px;
border-radius:10px;
margin:15px 0;
}

ul,ol{
text-align:left;
margin-left:30px;
}

h2{
color:#ff7aa2;
}

button{
background:#F8C8DC;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1> Pizza Recipe</h1>

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591">



<h2>Ingredients</h2>

<ul>
<li>Pizza base</li>
<li>Pizza sauce</li>
<li>Cheese</li>
<li>Capsicum</li>
<li>Onion</li>
<li>Olives</li>
</ul>

<h2>Steps</h2>

<ol>
<li>Spread pizza sauce on base.</li>
<li>Add chopped vegetables.</li>
<li>Top with cheese.</li>
<li>Bake in oven for 10 minutes.</li>
<li>Slice and serve hot.</li>
</ol>

<button onclick="history.back()">⬅ Back</button>

</div>

</body>
</html>
