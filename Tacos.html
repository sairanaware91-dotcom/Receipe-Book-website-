<!DOCTYPE html>
<html>
<head>
<title>Tacos Recipe</title>

<style>
body{
font-family:Arial;
background:#fff7f0;
text-align:center;
padding:30px;
}

.container{
background:white;
max-width:700px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

img{
width:100%;
max-width:400px;
border-radius:10px;
margin:15px 0;
}

ul,ol{
text-align:left;
margin-left:30px;
}

h2{
color:#ff7aa2;
}

button{

<body>

<div class="container">

<h1> Tacos</h1>

<img src="https://images.unsplash.com/photo-1615870216519-2f9fa575fa5c">


<h2>Ingredients</h2>

<ul>
<li>Taco shells</li>
<li>Cooked chicken or beans</li>
<li>Lettuce</li>
<li>Tomato</li>
<li>Cheese</li>
</ul>

<h2>Steps</h2>

<ol>
<li>Warm the taco shells.</li>
<li>Add cooked filling.</li>
<li>Add lettuce and tomato.</li>
<li>Top with cheese.</li>
<li>Serve immediately.</li>
</ol>
