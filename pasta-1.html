<html>
<head>
<title>Pasta Recipe</title>

<style>

body{
font-family:Arial;
background:#fff7f0;
text-align:center;
padding:30px;
}

.container{
background:white;
max-width:700px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);

img{
width:100%;

}

ul,ol{
text-align:left;

}

h2{
color:#ff7aa2;
}

button{

<body>

<div class="container">

<h1> Pasta Recipe</h1>

<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9">


<h2>Ingredients</h2>

<ul>
<li>Pasta</li>
<li>Olive oil</li>
<li>Garlic</li>
<li>Tomato sauce</li>
<li>Cheese</li>
<li>Salt and pepper</li>
</ul>

<h2>Steps</h2>

<ol>
<li>Boil pasta in salted water.</li>
<li>Heat olive oil and sauté garlic.</li>
<li>Add tomato sauce.</li>
<li>Mix boiled pasta.</li>
<li>Top with cheese and serve.</li>
</ol>
