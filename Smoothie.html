<!DOCTYPE html>
<html>
<head>
<title>Smoothie Recipe</title>

<style>

body{
font-family:Arial;
background:#fff7f0;
text-align:center;
padding:30px;
}

.container{
background:white;
max-width:700px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

img{
width:100%;
max-width:400px;
border-radius:10px;
margin:15px 0;
}

ul,ol{
text-align:left;
margin-left:30px;
}

h2{
color:#ff7aa2;
}

button{
background:#F8C8DC;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1> Fruit Smoothie</h1>

<img src="https://images.unsplash.com/photo-1546173159-315724a31696">


<h2>Ingredients</h2>

<ul>
<li>1 Banana</li>
<li>1 cup strawberries</li>
<li>1 cup milk</li>
<li>1 tsp honey</li>
<li>Ice cubes</li>
</ul>

<h2>Steps</h2>

<ol>
<li>Add banana and strawberries in blender.</li>
<li>Pour milk.</li>
<li>Add honey and ice cubes.</li>
<li>Blend until smooth.</li>
<li>Serve chilled.</li>
</ol>

<button onclick="history.back()">⬅ Back</button>

</div>

</body>
</html>
