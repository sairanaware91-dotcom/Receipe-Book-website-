<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>

<style>

body{
font-family:Arial;
margin:0;
background:#fff7f0;
}

/* Navbar */

.navbar{
background:#F8C8DC;
padding:15px;
display:flex;
justify-content:center;
gap:30px;
}

.navbar a{
text-decoration:none;
color:black;
font-size:18px;
font-weight:bold;
}

.navbar a:hover{
color:white;
}

/* Header */

.header{
text-align:center;
padding:30px;
}

/* Contact Form */

.contact-container{
display:flex;
justify-content:center;
padding:30px;
}

form{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
width:300px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#F8C8DC;
border:none;
padding:10px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#f4a6c1;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

<a href="index.html">Home</a>
<a href="breakfast.html">Breakfast</a>
<a href="dinner.html">Dinner</a>
<a href="drinks.html">Drinks</a>
<a href="speciality.html">Speciality</a>
<a href="contact.html">Contact</a>

</div>

<!-- Header -->

<div class="header">

<h1>Contact Us</h1>
<p>Send us your feedback or recipe ideas</p>

</div>

<!-- Contact Form -->

<div class="contact-container">

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea rows="4" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
