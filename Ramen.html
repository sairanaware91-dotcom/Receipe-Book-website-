<!DOCTYPE html>
<html>
<head>
<title>Ramen Recipe</title>

<style>
body{
font-family:Arial;
background:#fff7f0;
text-align:center;
padding:30px;
}

.container{
background:white;
max-width:700px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

img{
width:100%;
max-width:400px;
border-radius:10px;
margin:15px 0;
}

ul,ol{
text-align:left;
margin-left:30px;
}

h2{
color:#ff7aa2;
}

button{
background:#F8C8DC;

</head>

<body>

<div class="container">

<h1> Ramen Noodles</h1>

<img src="https://images.unsplash.com/photo-1569718212165-3a8278d5f624">

<h2>Ingredients</h2>

<ul>
<li>Ramen noodles</li>
<li>Chicken or vegetable broth</li>
<li>Boiled egg</li>
<li>Spring onions</li>
<li>Soy sauce</li>
</ul>

<h2>Steps</h2>

<ol>
<li>Boil ramen noodles.</li>
<li>Heat broth in a pan.</li>
<li>Add soy sauce.</li>
<li>Add noodles to broth.</li>
<li>Top with boiled egg and spring onions.</li>
</ol>
